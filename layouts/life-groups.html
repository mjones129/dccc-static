{{ define "main" }}

{{ with .Params.intro }}
<div class="w-full bg-yellow d-flex flex-column align-items-center py-5">
    <h1 class="text-3xl font-bold mb-4">{{ $.Title }}</h1>
    <p class="mb-6 w-75 text-dark">{{ . }}</p>
</div>
{{ end }}

<div class="d-flex flex-column justify-content-center mt-5">
    <img class="img-fluid mx-auto w-50" src="{{ .Params.image }}" alt="{{ .Title }} Image" />
</div>

<div class="d-flex flex-column my-5 mx-5 px-5 py-3">
    {{ .Content }}
    <a href="{{ .Params.buttonlink }}" target="_blank" class="btn btn-primary mt-3 w-50 mx-auto">{{ .Params.buttontext }}</a>
</div>


{{ end }}
