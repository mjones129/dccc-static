{{ define "main" }}

{{ with .Params.intro }}
<div class="w-full bg-yellow d-flex flex-column align-items-center py-5 px-3 px-md-5 text-center">
    <h1 class="text-3xl font-bold mb-4">{{ $.Title }}</h1>
    <p class="mb-4 mx-auto" style="max-width:780px;">{{ . }}</p>
</div>
{{ end }}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            <div class="bg-grey rounded-4 shadow-sm p-4 p-md-5">
                <div class="mb-4 text-light">
                    {{ .Content }}
                </div>
                <div class="d-flex flex-column flex-md-row justify-content-center gap-3">
                    <a href="{{ .Params.button1link }}" class="btn btn-primary btn-lg w-100 w-md-auto">{{ .Params.button1text }}</a>
                    <a href="{{ .Params.button2link }}" class="btn btn-primary btn-lg w-100 w-md-auto">{{ .Params.button2text }}</a>
                    <a href="{{ .Params.button3link }}" class="btn btn-primary btn-lg w-100 w-md-auto">{{ .Params.button3text }}</a>
                </div>
            </div>
        </div>
    </div>
</div>

{{ end }}
