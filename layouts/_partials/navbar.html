{{- /* Navbar with integrated menu rendering */ -}}
<nav class="navbar">
  <div class="container">
    <a href="/">
        <img class="logo" src="/images/dccc-logo.webp" />
    </a>
    {{- $page := . }}
    {{- $menuID := "main" }}
    {{- with index site.Menus $menuID }}
      <ul class="nav-links">
        {{- partial "inline/menu/walk.html" (dict "page" $page "menuEntries" .) }}
      </ul>
    {{- end }}
  </div>
</nav>
