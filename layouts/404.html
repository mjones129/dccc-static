<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
  <style>
    .notfound-container {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #262626;
      color: #fad02c;
      text-align: center;
    }
    .notfound-title {
      font-size: 4rem;
      font-weight: bold;
    }
    .notfound-message {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }
    .notfound-btn {
      background-color: #fad02c;
      color: #222;
      border: none;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1.1rem;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  {{ partial "navbar.html" . }}
  <main>
    <div class="notfound-container">
      <div class="notfound-title">404</div>
      <div class="notfound-message">Sorry, that page could not be found.</div>
      <a href="/" class="notfound-btn">Go Home</a>
    </div>
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>
</body>
</html>
