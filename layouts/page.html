{{ define "main" }}

{{ with .Params.intro }}
<div class="w-full bg-yellow d-flex flex-column align-items-center py-5">
    <h1 class="text-3xl font-bold mb-4">{{ $.Title }}</h1>
    <p class="mb-6 w-75 text-dark">{{ . }}</p>
</div>
{{ end }}

{{ with .Params.intro2 }}
<div class="mx-lg-5 mx-sm-1">
  <p>{{ . }}</p>
</div>
{{ end }}


<div class="d-flex flex-column my-5 mx-lg-5 mx-sm-1 px-5 py-3">
    {{ .Content }}
</div>

{{ end }}
