{{ define "main" }}

{{ with .Params.intro }}
<div class="w-full bg-yellow d-flex flex-column align-items-center py-5">
    <h1 class="text-3xl font-bold mb-4">{{ $.Title }}</h1>
    <p class="mb-6 w-75 text-dark">{{ . }}</p>
</div>
{{ end }}

<div class="d-flex flex-column my-5 mx-lg-5 mx-sm-1 px-5 py-3">
    {{ .Content }}
</div>

{{ with .Params.cards }}
<div class="d-flex flex-wrap justify-content-evenly my-4">
    {{ range . }}
        <div class="card" style="width: 18rem;">
            <img src="{{ .image }}" class="card-img-top" alt="{{ .title }}">
            <div class="card-body bg-dark text-white">
                <h5 class="card-title">{{ .title }}</h5>
                <p class="card-text">{{ .text }}</p>
                <a href="{{ .link }}" class="btn btn-primary">{{ .linktext }}</a>
            </div>
        </div>
    {{ end }}
</div>
{{ end }}

{{ end }}
